<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Odontosoft</title>
    <base href="/" />

    <!-- Tailwind CSS -->
    <link href="css/tailwindcss.css" rel="stylesheet" />

    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body class="bg-gray-100 overflow-hidden">

    <!-- Loader -->
    <div id="loader"
         class="fixed inset-0 z-50 flex items-center justify-center bg-gray-100">
        <div class="flex flex-col items-center space-y-6">

            <!-- Animated logo -->
            <div class="relative">
                <div class="h-16 w-16 rounded-full border-4 border-gray-300"></div>
                <div class="absolute inset-0 h-16 w-16 rounded-full border-4 border-gray-900 border-t-transparent animate-spin"></div>
            </div>

            <!-- Text -->
            <div class="text-center">
                <h1 class="text-lg font-semibold text-gray-800 tracking-wide">
                    Odontosoft
                </h1>
                <p class="text-sm text-gray-500">
                    Inicializando aplicación…
                </p>
            </div>
        </div>
    </div>

    <!-- Blazor app -->
    <div id="app" class="hidden"></div>

    <!-- Blazor -->
    <script src="_framework/blazor.webassembly.js"></script>

    <!-- SweetAlert -->
    <script src="_content/CurrieTechnologies.Razor.SweetAlert2/sweetAlert2.min.js"></script>

    <!-- Loader control -->
    <script>
        const observer = new MutationObserver(() => {
            const app = document.getElementById("app");
            const loader = document.getElementById("loader");

            if (app && app.children.length > 0) {
                loader.classList.add("opacity-0");
                loader.classList.add("pointer-events-none");

                setTimeout(() => {
                    loader.remove();
                    app.classList.remove("hidden");
                    document.body.classList.remove("overflow-hidden");
                }, 300);

                observer.disconnect();
            }
        });

        observer.observe(document.getElementById("app"), {
            childList: true
        });
    </script>

</body>
</html>
